<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>像素矩阵双向解析器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f7fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 28px 30px 32px;
            border: 1px solid #eef0f5;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            font-weight: 500;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }
        .sub {
            text-align: center;
            color: #6a6a7a;
            font-size: 0.8rem;
            border-bottom: 1px solid #e6eaf0;
            padding-bottom: 14px;
            margin-bottom: 22px;
        }
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 700px) {
            .two-col { grid-template-columns: 1fr; }
        }

        /* 左侧样式 - 来自1.html */
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: #6a6a7a;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            background: #f9faff;
        }
        .upload-area:hover { border-color: #3f6b9c; background: #f2f6fe; }
        .upload-area input { display: none; }
        .upload-area .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

        .panel {
            background: #f9faff;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #e9edf4;
        }
        .panel-title {
            color: #4a4a5a;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-align: center;
        }
        .panel-title span { color: #3f6b9c; }

        .canvas-wrap {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #f2f4f8;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            margin-top: 8px;
            font-size: 0.7rem;
            color: #6a6a7a;
            background: #f0f3f9;
            padding: 8px 14px;
            border-radius: 12px;
        }
        .info-grid .label { color: #5c6f84; }
        .info-grid .value { color: #1a1a2e; text-align: right; font-family: monospace; font-weight: 500; }

        .status-bar {
            text-align: center;
            color: #6a6a7a;
            font-size: 0.75rem;
            margin-top: 8px;
        }
        .status-bar .ok { color: #1a8b4a; }
        .status-bar .loading { color: #b45f2b; }

        .btn {
            background: #eef2f8;
            border: 1px solid #d0d9e5;
            color: #1f344b;
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 8px;
        }
        .btn:hover { background: #e3e9f3; border-color: #a0b6d0; }
        .btn-primary { background: #1f3a5f; border-color: #1a3354; color: white; }
        .btn-primary:hover { background: #142b48; }
        .btn-success { background: #1e7b4c; border-color: #17663e; color: white; }
        .btn-success:hover { background: #15633d; }
        .btn-danger { background: #b13e3e; border-color: #8f2f2f; color: white; }
        .btn-danger:hover { background: #8f2f2f; }
        .btn:disabled { opacity: 0.5; pointer-events: none; }

        .btn-row { text-align: center; margin-top: 4px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

        .tag {
            display: inline-block;
            background: #eaeef5;
            color: #1f3a57;
            font-size: 0.65rem;
            padding: 2px 14px;
            border-radius: 40px;
            border: 1px solid #dde3ed;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #2a5c8a;
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }

        .footer {
            text-align: center;
            color: #8899ae;
            font-size: 0.65rem;
            margin-top: 18px;
            border-top: 1px solid #e6ecf3;
            padding-top: 14px;
        }

        /* 右侧样式 - 来自2.html */
        .drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            background: #f9faff;
            color: #6a6a7a;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #3f6b9c;
            background: #f2f6fe;
        }
        .drop-zone .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .drop-zone p { margin: 4px 0; color: #6a6a7a; }
        .drop-zone .hint { font-size: 0.75rem; color: #8899ae; }

        .error-msg {
            color: #b13e3e;
            background: #fde8e8;
            padding: 10px 18px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border-left: 4px solid #b13e3e;
            font-size: 0.8rem;
        }
        .success-msg {
            color: #1a7b44;
            background: #e8f5ed;
            padding: 10px 18px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border-left: 4px solid #1a7b44;
            font-size: 0.8rem;
        }
        .error-msg.show, .success-msg.show { display: block; }

        #canvas-container {
            background: #ffffff;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-top: 10px;
            overflow: auto;
            display: flex;
            justify-content: center;
            min-height: 120px;
        }
        #canvas-container canvas {
            display: block;
            image-rendering: pixelated;
            border-radius: 4px;
            max-width: 100%;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .checkbox-group label {
            color: #5c6f84;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔄 像素矩阵 · 双向解析</h1>
    <div class="sub">图片 ↔ JSON · 上传图片提取全部像素 · 导入 JSON 还原图像</div>

    <div class="two-col">
        <!-- ========== 左侧：图片 → JSON（来自1.html） ========== -->
        <div>
            <div class="panel">
                <div class="panel-title">📸 图片 → <span>JSON</span></div>

                <div class="upload-area" id="uploadArea">
                    <span class="icon">🖼️</span>
                    点击选择图片 或 拖拽图片到此处
                    <input type="file" id="fileInput" accept="image/*">
                    <div style="font-size:0.65rem;color:#8899ae;margin-top:6px;">最大 10 MB · JPG / PNG</div>
                </div>

                <div class="canvas-wrap" id="sourceWrap">
                    <canvas id="sourceCanvas" width="400" height="300"></canvas>
                </div>

                <div class="info-grid">
                    <span class="label">像素总数</span>
                    <span class="value" id="totalPixels">-</span>
                    <span class="label">尺寸</span>
                    <span class="value" id="imageSize">-</span>
                    <span class="label">数据长度 (RGBA)</span>
                    <span class="value" id="dataLength">-</span>
                </div>

                <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
                <div class="status-bar" id="statusBar">⏳ 等待上传图片</div>

                <div class="checkbox-group">
                    <label><input type="checkbox" id="fullExport" checked> 导出全部像素</label>
                    <label><input type="checkbox" id="prettyJson" checked> 格式化 JSON</label>
                </div>

                <div class="btn-row">
                    <button class="btn btn-primary" id="exportBtn" disabled>💾 导出 JSON</button>
                    <button class="btn" id="resetBtn">🔄 清除</button>
                </div>
                <div style="text-align:center;margin-top:6px;">
                    <span class="tag" id="fileInfo">未加载</span>
                </div>
            </div>
        </div>

        <!-- ========== 右侧：JSON → 图片（来自2.html） ========== -->
        <div>
            <div class="panel">
                <div class="panel-title">📂 JSON → <span>图片</span></div>

                <div class="drop-zone" id="dropZone">
                    <div class="icon">📁</div>
                    <p><strong>拖拽 JSON 文件到这里</strong></p>
                    <p class="hint">或点击下方按钮选择文件</p>
                    <input type="file" id="fileInputJson" accept=".json" style="display:none;">
                </div>

                <div id="canvas-container">
                    <canvas id="canvas"></canvas>
                </div>

                <div id="stats" style="text-align:center;font-size:0.75rem;color:#5c6f84;margin-top:6px;"></div>
                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>

                <div class="btn-row">
                    <button class="btn btn-success" id="downloadPngBtn" disabled>⬇️ 下载 PNG</button>
                    <button class="btn" id="loadSampleBtn">📦 示例</button>
                    <button class="btn" id="resetBtnJson">🔄 清除</button>
                    <button class="btn" id="zoomBtn" disabled>🔍 放大</button>
                </div>
                <div style="text-align:center;margin-top:6px;">
                    <span class="tag" id="fileInfoJson">未加载</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        ⚡ 解析最大 10MB 图片 · 导出 JSON 包含全部像素 · 点击放大图片
    </div>
</div>

<!-- 放大 Modal -->
<div id="modalOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center;padding:30px;">
    <div style="background:#fff;border-radius:24px;padding:16px;max-width:92vw;max-height:92vh;display:flex;flex-direction:column;align-items:flex-end;">
        <button id="modalCloseBtn" style="background:#eef2f8;border:none;font-size:1.3rem;padding:2px 16px;border-radius:60px;cursor:pointer;margin-bottom:8px;color:#1e2f42;">✕</button>
        <img id="modalImage" src="" alt="放大预览" style="max-width:100%;max-height:80vh;border-radius:12px;display:block;background:#f0f2f6;object-fit:contain;">
    </div>
</div>

<script>
(function() {
    // ================================================================
    // 左侧：图片 → JSON（来自1.html，保持原有逻辑不变）
    // ================================================================
    const canvas = document.getElementById('sourceCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const exportBtn = document.getElementById('exportBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusBar = document.getElementById('statusBar');
    const totalPixels = document.getElementById('totalPixels');
    const imageSize = document.getElementById('imageSize');
    const dataLength = document.getElementById('dataLength');
    const fileInfo = document.getElementById('fileInfo');
    const progressFill = document.getElementById('progressFill');
    const fullExport = document.getElementById('fullExport');
    const prettyJson = document.getElementById('prettyJson');

    let currentImageData = null;
    let currentWidth = 0;
    let currentHeight = 0;

    function processImage(file) {
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) {
            alert('图片超过 10MB，请压缩后重试');
            return;
        }
        fileInfo.textContent = '📄 ' + file.name;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                let w = img.width, h = img.height;
                const maxSize = 1200;
                if (w > maxSize || h > maxSize) {
                    const ratio = Math.min(maxSize / w, maxSize / h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                }
                canvas.width = w;
                canvas.height = h;
                currentWidth = w;
                currentHeight = h;
                ctx.drawImage(img, 0, 0, w, h);
                currentImageData = ctx.getImageData(0, 0, w, h);

                const total = w * h;
                totalPixels.textContent = total.toLocaleString();
                imageSize.textContent = w + ' × ' + h;
                dataLength.textContent = currentImageData.data.length.toLocaleString();
                exportBtn.disabled = false;
                statusBar.innerHTML = '✅ 加载成功！共 ' + total.toLocaleString() + ' 个像素';
                statusBar.className = 'status-bar ok';
                progressFill.style.width = '0%';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function exportJSON() {
        if (!currentImageData) {
            alert('请先上传图片！');
            return;
        }
        const data = currentImageData.data;
        const w = currentWidth, h = currentHeight;
        const total = w * h;
        const isFull = fullExport.checked;
        const sampleSize = isFull ? total : Math.min(1000, total);

        statusBar.innerHTML = '⏳ 正在导出 ' + sampleSize.toLocaleString() + ' 个像素 ...';
        statusBar.className = 'status-bar loading';
        progressFill.style.width = '30%';

        setTimeout(function() {
            try {
                const pixels = [];
                const count = sampleSize;
                for (let i = 0; i < count; i++) {
                    const idx = i * 4;
                    pixels.push({
                        r: data[idx],
                        g: data[idx + 1],
                        b: data[idx + 2],
                        a: data[idx + 3]
                    });
                    if (i % 5000 === 0 && i > 0) {
                        progressFill.style.width = ((i / count) * 70 + 20) + '%';
                    }
                }
                progressFill.style.width = '92%';

                const jsonData = {
                    width: w,
                    height: h,
                    totalPixels: total,
                    channels: 4,
                    format: 'RGBA',
                    isFullExport: isFull,
                    pixels: pixels
                };
                const json = prettyJson.checked ? JSON.stringify(jsonData, null, 2) : JSON.stringify(jsonData);

                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = 'pixel_matrix_' + Date.now() + '.json';
                link.href = url;
                link.click();
                URL.revokeObjectURL(url);

                progressFill.style.width = '100%';
                statusBar.innerHTML = '✅ 导出完成！' + count.toLocaleString() + ' 个像素，文件大小: ' + (blob.size / 1024 / 1024).toFixed(2) + ' MB';
                statusBar.className = 'status-bar ok';
                setTimeout(function() { progressFill.style.width = '0%'; }, 1000);
            } catch (err) {
                statusBar.innerHTML = '❌ 导出失败: ' + err.message;
                statusBar.className = 'status-bar';
            }
        }, 50);
    }

    function resetAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.width = 400;
        canvas.height = 300;
        currentImageData = null;
        currentWidth = 0;
        currentHeight = 0;
        totalPixels.textContent = '-';
        imageSize.textContent = '-';
        dataLength.textContent = '-';
        exportBtn.disabled = true;
        fileInfo.textContent = '未加载';
        statusBar.innerHTML = '⏳ 等待上传图片';
        statusBar.className = 'status-bar';
        progressFill.style.width = '0%';
        fileInput.value = '';
    }

    // 左侧事件
    fileInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            processImage(this.files[0]);
        }
        this.value = '';
    });

    uploadArea.addEventListener('click', function() {
        fileInput.click();
    });

    uploadArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.style.borderColor = '#3f6b9c';
        this.style.background = '#f2f6fe';
    });

    uploadArea.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.style.borderColor = '#cbd5e1';
        this.style.background = '#f9faff';
    });

    uploadArea.addEventListener('drop', function(e) {
        e.preventDefault();
        this.style.borderColor = '#cbd5e1';
        this.style.background = '#f9faff';
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            processImage(e.dataTransfer.files[0]);
        }
    });

    exportBtn.addEventListener('click', exportJSON);
    resetBtn.addEventListener('click', resetAll);

    // ================================================================
    // 右侧：JSON → 图片（来自2.html，保持原有逻辑不变）
    // ================================================================
    const canvasJson = document.getElementById('canvas');
    const ctxJson = canvasJson.getContext('2d');
    const stats = document.getElementById('stats');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const fileInputJson = document.getElementById('fileInputJson');
    const dropZone = document.getElementById('dropZone');
    const downloadPngBtn = document.getElementById('downloadPngBtn');
    const loadSampleBtn = document.getElementById('loadSampleBtn');
    const resetBtnJson = document.getElementById('resetBtnJson');
    const zoomBtn = document.getElementById('zoomBtn');
    const fileInfoJson = document.getElementById('fileInfoJson');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalImage = document.getElementById('modalImage');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    let currentImageDataJson = null;

    function showError(msg) {
        errorMsg.textContent = '❌ ' + msg;
        errorMsg.className = 'error-msg show';
        successMsg.className = 'success-msg';
    }

    function showSuccess(msg) {
        successMsg.textContent = '✅ ' + msg;
        successMsg.className = 'success-msg show';
        errorMsg.className = 'error-msg';
    }

    function hideMessages() {
        errorMsg.className = 'error-msg';
        successMsg.className = 'success-msg';
    }

    function renderFromJson(json) {
        hideMessages();
        const width = json.width;
        const height = json.height;
        const pixels = json.pixels;

        if (!width || !height || !pixels || !Array.isArray(pixels)) {
            showError('缺少必要字段: width, height, pixels 数组');
            return;
        }

        const expectedCount = width * height;
        if (pixels.length !== expectedCount) {
            showError('像素数量不匹配！期望 ' + expectedCount + '，实际 ' + pixels.length);
            return;
        }

        const imageData = ctxJson.createImageData(width, height);
        const data = imageData.data;
        for (let i = 0; i < pixels.length; i++) {
            const p = pixels[i];
            const idx = i * 4;
            data[idx] = p.r ?? 0;
            data[idx + 1] = p.g ?? 0;
            data[idx + 2] = p.b ?? 0;
            data[idx + 3] = p.a ?? 255;
        }

        canvasJson.width = width;
        canvasJson.height = height;
        ctxJson.putImageData(imageData, 0, 0);

        currentImageDataJson = imageData;
        stats.innerHTML = '✅ 渲染成功！📐 尺寸: ' + width + ' × ' + height + ' (' + pixels.length + ' 像素)';
        showSuccess('图片已显示！共 ' + pixels.length + ' 个像素');
        fileInfoJson.textContent = '📊 ' + (json.format || 'RGBA') + ' · ' + pixels.length + ' 像素';
        downloadPngBtn.disabled = false;
        zoomBtn.disabled = false;
        fitCanvasToScreen();
    }

    function readFile(file) {
        if (!file) return;
        fileInfoJson.textContent = '📄 ' + file.name;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                renderFromJson(json);
            } catch (err) {
                showError('JSON 解析失败: ' + err.message);
            }
        };
        reader.readAsText(file);
    }

    function fitCanvasToScreen() {
        const container = document.getElementById('canvas-container');
        const maxWidth = container.clientWidth - 20 || 400;
        const maxHeight = 300;
        const nw = canvasJson.width, nh = canvasJson.height;
        if (nw === 0 || nh === 0) return;
        let scale = 1;
        if (nw > maxWidth || nh > maxHeight) {
            scale = Math.min(maxWidth / nw, maxHeight / nh);
        }
        if (nw < 80 && nh < 80) scale = Math.min(4, Math.max(1, 300 / nw));
        canvasJson.style.width = Math.floor(nw * scale) + 'px';
        canvasJson.style.height = Math.floor(nh * scale) + 'px';
        canvasJson.style.imageRendering = 'pixelated';
    }

    function loadSample() {
        const w = 24, h = 18;
        const samplePixels = [];
        for (let i = 0; i < w * h; i++) {
            const x = i % w, y = Math.floor(i / w);
            samplePixels.push({
                r: Math.floor(140 + 115 * (x / w)),
                g: Math.floor(80 + 170 * (y / h)),
                b: Math.floor(180 + 75 * ((x + y) / (w + h))),
                a: 255
            });
        }
        const sampleJson = { width: w, height: h, channels: 4, format: 'RGBA', pixels: samplePixels };
        renderFromJson(sampleJson);
        fileInfoJson.textContent = '📦 示例数据 24×18';
    }

    function resetView() {
        canvasJson.width = 0;
        canvasJson.height = 0;
        canvasJson.style.width = 'auto';
        canvasJson.style.height = 'auto';
        stats.innerHTML = '';
        currentImageDataJson = null;
        fileInfoJson.textContent = '未加载';
        downloadPngBtn.disabled = true;
        zoomBtn.disabled = true;
        hideMessages();
        fileInputJson.value = '';
    }

    function downloadPng() {
        if (!currentImageDataJson) return;
        const link = document.createElement('a');
        link.download = 'restored_' + Date.now() + '.png';
        link.href = canvasJson.toDataURL('image/png');
        link.click();
    }

    function zoomImage() {
        if (!currentImageDataJson) return;
        modalImage.src = canvasJson.toDataURL('image/png');
        modalOverlay.style.display = 'flex';
    }

    // 右侧事件
    fileInputJson.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            readFile(this.files[0]);
        }
        this.value = '';
    });

    dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.json')) {
            readFile(file);
        } else {
            showError('请拖入 JSON 文件！');
        }
    });

    dropZone.addEventListener('click', function() {
        fileInputJson.click();
    });

    downloadPngBtn.addEventListener('click', downloadPng);
    loadSampleBtn.addEventListener('click', loadSample);
    resetBtnJson.addEventListener('click', resetView);
    zoomBtn.addEventListener('click', zoomImage);

    modalCloseBtn.addEventListener('click', function() {
        modalOverlay.style.display = 'none';
    });
    modalOverlay.addEventListener('click', function(e) {
        if (e.target === this) modalOverlay.style.display = 'none';
    });

    window.addEventListener('resize', function() {
        if (currentImageDataJson) fitCanvasToScreen();
    });

    // 初始化
    resetAll();
    resetView();
    setTimeout(loadSample, 300);

    console.log('🔄 像素矩阵双向解析器已启动');
})();
</script>
</body>
</html>
